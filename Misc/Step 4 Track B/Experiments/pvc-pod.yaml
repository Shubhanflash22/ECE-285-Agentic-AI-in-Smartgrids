apiVersion: v1
kind: Pod
metadata:
  name: pvc-reader
  namespace: shi-group-ece-advanced
spec:
  containers:
  - name: pvc-reader
    image: python:3.10
    command: ["sleep"]
    args: ["infinity"]
    volumeMounts:
    - mountPath: /data
      name: mypvc
  volumes:
  - name: mypvc
    persistentVolumeClaim:
      claimName: seed-mining-sdxl